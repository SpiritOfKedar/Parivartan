# Local stack + document worker (optional).
# Production can use Neon + Upstash instead of postgres/redis services below.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: convert
      POSTGRES_PASSWORD: convert
      POSTGRES_DB: convert_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  document-worker:
    build:
      context: ..
      dockerfile: workers/document-worker/Dockerfile
    env_file:
      - ../apps/api/.env
    environment:
      CONVERSION_ENGINE: node
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      OCR_LANGUAGES: eng
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
